schema_version: 1

context:
  version: "0.11.4"

package:
  name: fps-kernels
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/f/fps-kernels/fps_kernels-${{ version }}.tar.gz
    sha256: 785671231baeda72dd08f88b03f4c09704da76935d4e7e900840643f02a432e0

build:
  noarch: python
  number: 0
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - uv-build
  run:
    - python >=${{ python_min }}
    - anyio
    - fastapi-core
    - fps
    - jupyverse-api >=0.15.2,<0.16.0
    - jupyverse-auth >=0.2.0,<0.3.0
    - jupyverse-file-watcher >=0.1.0,<0.2.0
    - jupyverse-frontend >=0.1.0,<0.2.0
    - jupyverse-kernel >=0.1.0,<0.2.0
    - jupyverse-kernels >=0.1.0,<0.2.0
    - jupyverse-yjs >=0.1.1,<0.2.0
    - packaging
    - pycrdt
    - python-dateutil
    - starlette
    - structlog
    - types-python-dateutil

tests:
  - python:
      imports: fps_kernels
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  license: BSD-3-Clause
  license_file: COPYING.md
  homepage: https://github.com/jupyter-server/jupyverse/tree/main/plugins/kernels
  summary: An FPS plugin for the kernels API

extra:
  recipe-maintainers:
    - davidbrochart
